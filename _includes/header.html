<style>
  /* 기본 스타일 */
  .nav-container {
    position: relative;
    display: inline-block;
  }

  .nav-button {
    color: black;
    cursor: pointer;
    user-select: none;
  }

  /* 드롭다운 메뉴 */
  .dropdown {
    color: black;
    display: none;
    position: absolute;
    border: 1px solid #ddd;
    border-radius: 4px;
    min-width: 160px;
    line-height: 40px;
  }

  .dropdown a {
    display: block;
    text-decoration: none;
    color: inherit;
  }

  .dropdown a:hover {
    background-color: #eee;
  }
</style>

<header class="site-header" role="banner">
  <div class="wrapper">
    {%- assign no_display_categories = "twitter_archive" | split: "," -%}
    {%- assign categories = site.categories | sort -%}
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>
    <nav class="site-nav">
      <div class="trigger">
        <a class="page-link" href="/search">
          <img src="/assets/search.png" width="20"/>
        </a>

        <div class="nav-container">
          <div class="nav-button" onclick="toggleDropdown()">posts ▾</div>

          <div id="categoryDropdown" class="dropdown">
            <a href="/all">all</a>
            {% for category in categories %}
              {%- unless no_display_categories contains category[0] -%}
                <a href="/{{ category[0] }}">{{ category[0] }}</a>
              {%- endunless -%}
            {% endfor %}
          </div>
        </div>
      </div>
    </nav>
  </div>
</header>

<script>
  function toggleDropdown() {
    const el = document.getElementById("categoryDropdown");
    el.style.display = (el.style.display === "block") ? "none" : "block";
  }

  // 영역 밖 클릭 시 드롭다운 닫기
  document.addEventListener("click", function(e) {
    const dropdown = document.getElementById("categoryDropdown");
    const button = document.querySelector(".nav-button");

    // 버튼 클릭이 아니라면 닫기
    if (!button.contains(e.target)) {
      dropdown.style.display = "none";
    }
  });
</script>
