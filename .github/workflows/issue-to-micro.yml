name: Issue to Micro Post

on:
  issues:
    types: [opened]

concurrency:
  group: content-publish
  cancel-in-progress: false

jobs:
  micro:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up jq
        run: sudo apt-get install -y jq

      - name: Skip if post
        id: guard
        run: |
          LABELS=$(jq -r 'map(.name) | join(", ")' <<< '${{ toJson(github.event.issue.labels) }}')
          echo "Labels: $LABELS"

          if echo "$LABELS" | grep -qw "micro"; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate micro post from issue
        if: steps.guard.outputs.proceed == 'true'
        run: |
          LABELS=$(jq -r 'map(.name) | join(", ")' <<< '${{ toJson(github.event.issue.labels) }}')
          echo "Labels: $LABELS"

          if ! echo "$LABELS" | grep -qw "micro"; then
            echo "Not a micro issue. Skipping."
            exit 0
          fi

          BODY="${{ github.event.issue.body }}"

          if [ -z "$BODY" ]; then
            echo "Empty body. Skipping."
            exit 0
          fi

          CREATED_AT="${{ github.event.issue.created_at }}"
          DATE=$(TZ=Asia/Seoul date -d "$CREATED_AT" +"%Y-%m-%d %H:%M")

          FILENAME_DATE=$(TZ=Asia/Seoul date -d "$CREATED_AT" +"%Y-%m-%d-%H%M")
          FILENAME="_micro/${FILENAME_DATE}.markdown"
          HAS_TIME=true

          echo "Creating micro post: $FILENAME"

          mkdir -p _micro

          {
            echo "---"
            echo "date: $DATE"
            echo "has_time: $HAS_TIME"
            echo "---"
            echo ""
            echo "$BODY"
          } > "$FILENAME"

      - name: Commit and push changes
        if: steps.guard.outputs.proceed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _micro
          git commit -m "Add micro post from issue #${{ github.event.issue.number }}"
          git pull --rebase
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "📌 Micro post published."
