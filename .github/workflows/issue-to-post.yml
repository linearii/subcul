name: Issue to Jekyll Post

on:
  issues:
    types: [opened]

concurrency:
  group: content-publish
  cancel-in-progress: false

jobs:
  create-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up jq
        run: sudo apt-get install -y jq

      - name: Skip if micro
        id: guard
        run: |
          LABELS=$(jq -r 'map(.name) | join(", ")' <<< '${{ toJson(github.event.issue.labels) }}')
          echo "Labels: $LABELS"
          
          if echo "$LABELS" | grep -qw "micro"; then
            echo "proceed=false" >> $GITHUB_OUTPUT
          else
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate Jekyll post from issue
        if: steps.guard.outputs.proceed == 'true'
        run: |
          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | tr ' ' '-')
          DATE=$(TZ=Asia/Seoul date -d "${{ github.event.issue.created_at }}" +"%Y-%m-%d")
          FILENAME="_posts/${DATE}-${SLUG}.markdown"

          echo "Creating post: $FILENAME"

          echo "---" > "$FILENAME"
          echo "layout: post" >> "$FILENAME"
          echo "categories: essay" >> "$FILENAME"
          echo "title: |" >> "$FILENAME"
          echo "  $TITLE" >> "$FILENAME"

          if [ -n "$LABELS" ]; then
            echo "tags: [$LABELS]" >> "$FILENAME"
          fi
          
          echo "---" >> "$FILENAME"
          echo "" >> "$FILENAME"
          echo "${{ github.event.issue.body }}" >> "$FILENAME"

      - name: Commit and push changes
        if: steps.guard.outputs.proceed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "Add post from issue #${{ github.event.issue.number }}"
          git pull --rebase
          git push
          
      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "📌 Post published."
