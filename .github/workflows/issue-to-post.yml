name: Issue to Jekyll Post

on:
  issues:
    types: [opened]

jobs:
  create-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Jekyll post from issue
        run: |
          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | tr ' ' '-')
          DATE=$(date -d "${{ github.event.issue.created_at }}" +"%Y-%m-%d")
          FILENAME="_posts/${DATE}-${SLUG}.md"

          echo "Creating post: $FILENAME"

          echo "---" > "$FILENAME"
          echo "layout: post" >> "$FILENAME"
          echo "categories: essay" >> "$FILENAME"
          echo "title: |" >> "$FILENAME"
          echo "  $TITLE" >> "$FILENAME"

          LABELS=$(echo "${{ toJson(github.event.issue.labels) }}" | jq -r 'map(.name) | join(", ")')
          if [ -n "$LABELS" ]; then
            echo "tags: [$LABELS]" >> "$FILENAME"
          fi
          
          echo "---" >> "$FILENAME"
          echo "" >> "$FILENAME"
          echo "${{ github.event.issue.body }}" >> "$FILENAME"

      - name: Commit and push changes
        run: |
          git add _posts/
          git commit -m "Add post from issue #${{ github.event.issue.number }}"
          git push
          
      - name: Close related GitHub Issue
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER \
            -d '{"state": "closed"}'
