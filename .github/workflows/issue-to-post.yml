name: Issue to Jekyll Post

on:
  issues:
    types: [opened]

jobs:
  create-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up jq
        run: sudo apt-get install -y jq

      - name: Generate Jekyll post from issue
        run: |
          LABELS=$(echo "${{ toJson(github.event.issue.labels) }}" | jq -r 'map(.name) | join(", ")')
          
          if echo "$LABELS" | grep -qw "micro"; then
            echo "Issue labeled as micro. Skipping post generation."
            exit 0
          fi

          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | tr ' ' '-')
          DATE=$(date -d "${{ github.event.issue.created_at }}" +"%Y-%m-%d")
          FILENAME="_posts/${DATE}-${SLUG}.md"

          echo "Creating post: $FILENAME"

          echo "---" > "$FILENAME"
          echo "layout: post" >> "$FILENAME"
          echo "categories: essay" >> "$FILENAME"
          echo "title: |" >> "$FILENAME"
          echo "  $TITLE" >> "$FILENAME"

          if [ -n "$LABELS" ]; then
            echo "tags: [$LABELS]" >> "$FILENAME"
          fi
          
          echo "---" >> "$FILENAME"
          echo "" >> "$FILENAME"
          echo "${{ github.event.issue.body }}" >> "$FILENAME"

      - name: Commit and push changes
        run: |
          git add _posts/
          git commit -m "Add post from issue #${{ github.event.issue.number }}"
          git push
          
      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "📌 Post published."
